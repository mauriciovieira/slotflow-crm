[project]
name = "slotflow-backend"
version = "0.0.0"
requires-python = ">=3.14"
description = "Slotflow CRM Django backend."

[tool.ruff]
target-version = "py314"
line-length = 100
src = ["."]
extend-exclude = ["**/migrations/**"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --ds=config.settings.local"

# Release automation (GitHub Actions: python-semantic-release). Commits must follow
# Conventional Commits (feat:, fix:, chore:, etc.) for version bumps.
[tool.semantic_release]
allow_zero_version = true
commit_parser = "conventional"
commit_message = """chore(release): {version} [skip ci]

Automatically generated by python-semantic-release"""
tag_format = "v{version}"
version_toml = ["pyproject.toml:project.version"]
version_variables = ["config/version.py:__version__"]

[tool.semantic_release.changelog.default_templates]
# Repository root (one level above this file)
changelog_file = "../CHANGELOG.md"
