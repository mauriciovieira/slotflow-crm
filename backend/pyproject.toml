[project]
name = "slotflow-backend"
version = "0.5.0"
requires-python = ">=3.14"
description = "Slotflow CRM Django backend."

[tool.ruff]
target-version = "py314"
line-length = 100
src = ["."]
extend-exclude = ["**/migrations/**"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
# Per-project convention: each app keeps its tests under `<app>/tests/`,
# named `<topic>_tests.py`. The repo-wide `tests/` directory holds
# cross-cutting suites (auth flow, healthz, mcp, etc.) that don't belong
# to a single app.
testpaths = [
    "tests",
    "opportunities/tests",
]
python_files = ["test_*.py", "*_tests.py"]
addopts = "-q --ds=config.settings.local"

# Release automation (GitHub Actions: python-semantic-release). Commits must follow
# Conventional Commits (feat:, fix:, chore:, etc.) for version bumps.
[tool.semantic_release]
allow_zero_version = true
commit_parser = "conventional-monorepo"
commit_message = """chore(release): backend {version} [skip ci]

Automatically generated by python-semantic-release"""
tag_format = "backend-v{version}"
version_toml = ["pyproject.toml:project.version"]
version_variables = ["config/version.py:__version__"]

[tool.semantic_release.commit_parser_options]
path_filters = ["."]
scope_prefix = "^backend"

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
