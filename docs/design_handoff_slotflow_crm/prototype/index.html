<style>
html, body, #root { height: 100%; }
body { background: #f3f3f3; margin: 0; }
:root {
  --color-brand: #14C98B;
  --color-brand-light: #c9f3e1;
  --color-brand-deep: #0a8f62;
  --color-amber: #c37d0d;
  --color-blue: #3772cf;
  --color-red: #d45656;
  --color-purple: #7a5af8;
  --color-bg: #ffffff;
  --color-panel: #fafafa;
  --color-card: #ffffff;
  --color-row-stripe: #fafafa;
  --color-row-hover: #f5f5f5;
  --color-text-primary: #0d0d0d;
  --color-text-secondary: #333333;
  --color-text-muted: #666666;
  --color-text-placeholder: #888888;
  --color-border-subtle: rgba(0, 0, 0, 0.06);
  --color-border-medium: rgba(0, 0, 0, 0.10);
  --color-border-strong: rgba(0, 0, 0, 0.12);
  --focus-ring-color: #14C98B;
  --focus-ring-tint: rgba(20, 201, 139, 0.25);
  --shadow-card: rgba(0, 0, 0, 0.03) 0px 1px 2px;
  --shadow-button: rgba(0, 0, 0, 0.06) 0px 1px 2px;
  --shadow-popover: rgba(0, 0, 0, 0.10) 0px 8px 24px;
  --shadow-modal: rgba(0, 0, 0, 0.18) 0px 16px 48px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 10px;
  --radius-xl: 14px;
  --radius-pill: 9999px;
  --font-sans: Inter, "Inter Fallback", system-ui, -apple-system, sans-serif;
  --font-mono: "Geist Mono", "Geist Mono Fallback", ui-monospace, SFMono-Regular, monospace;
  color-scheme: light;
}

/* Apply color + background on EVERY [data-theme] scope (not just :root),
   so the dual-preview dark frame repaints text instead of inheriting the
   body's light-mode var() resolution. */
[data-theme] {
  background: var(--color-bg);
  color: var(--color-text-primary);
}

[data-theme="dark"] {
  --color-bg: #0d0d0d;
  --color-panel: #171717;
  --color-card: #141414;
  --color-row-stripe: #141414;
  --color-row-hover: #1a1a1a;
  --color-text-primary: #ededed;
  --color-text-secondary: #a0a0a0;
  --color-text-muted: #8a8a8a;
  --color-text-placeholder: #6e6e6e;
  --color-border-subtle: rgba(255, 255, 255, 0.08);
  --color-border-medium: rgba(255, 255, 255, 0.12);
  --color-border-strong: rgba(255, 255, 255, 0.18);
  --color-brand-light: rgba(20, 201, 139, 0.15);
  --color-brand-deep: #4fe3b0;
  --color-purple: #a590ff;
  --color-red: #ff8a8a;
  --focus-ring-tint: rgba(20, 201, 139, 0.35);
  --shadow-card: none;
  --shadow-popover: rgba(0, 0, 0, 0.50) 0px 8px 24px;
  --shadow-modal: rgba(0, 0, 0, 0.60) 0px 16px 48px;
  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--color-bg);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

:focus-visible {
  outline: 1px solid var(--focus-ring-color);
  outline-offset: 2px;
  box-shadow: 0 0 0 3px var(--focus-ring-tint);
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

input, textarea, select {
  font-family: inherit;
  color: inherit;
}

a { color: inherit; text-decoration: none; }

/* Type */
.t-display { font-size: 48px; font-weight: 600; line-height: 1.10; letter-spacing: -0.96px; }
.t-page-title { font-size: 28px; font-weight: 600; line-height: 1.20; letter-spacing: -0.56px; }
.t-section { font-size: 20px; font-weight: 600; line-height: 1.25; letter-spacing: -0.30px; }
.t-sub { font-size: 16px; font-weight: 600; line-height: 1.30; letter-spacing: -0.16px; }
.t-body-lg { font-size: 16px; font-weight: 400; line-height: 1.50; }
.t-body { font-size: 14px; font-weight: 400; line-height: 1.45; }
.t-body-med { font-size: 14px; font-weight: 500; line-height: 1.45; }
.t-cell { font-size: 13px; font-weight: 400; line-height: 1.40; }
.t-th { font-size: 12px; font-weight: 500; line-height: 1.30; letter-spacing: 0.40px; text-transform: uppercase; }
.t-btn { font-size: 14px; font-weight: 500; line-height: 1.40; }
.t-link { font-size: 13px; font-weight: 500; line-height: 1.40; }
.t-caption { font-size: 12px; font-weight: 400; line-height: 1.45; color: var(--color-text-muted); }
.t-label-up { font-size: 12px; font-weight: 500; line-height: 1.40; letter-spacing: 0.60px; text-transform: uppercase; }
.t-mono { font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.40px; }
.t-mono-label { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.55px; text-transform: uppercase; }
.t-mono-micro { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.50px; text-transform: uppercase; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  font-size: 14px; font-weight: 500; line-height: 1.40;
  transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
  white-space: nowrap;
}
.btn:active { transform: translateY(0.5px); }
.btn-primary { background: var(--color-text-primary); color: var(--color-bg); box-shadow: var(--shadow-button); }
.btn-primary:hover { background: #1f1f1f; }
[data-theme="dark"] .btn-primary:hover { background: #d4d4d4; }
.btn-brand { background: var(--color-brand); color: #0d0d0d; box-shadow: var(--shadow-button); }
.btn-brand:hover { background: #0fb57a; }
.btn-ghost { background: var(--color-bg); color: var(--color-text-primary); border: 1px solid var(--color-border-medium); padding: 7px 13px; }
.btn-ghost:hover { background: var(--color-row-hover); }
.btn-icon { padding: 6px; border-radius: 6px; background: transparent; color: var(--color-text-muted); }
.btn-icon:hover { background: rgba(0,0,0,0.05); color: var(--color-text-primary); }
[data-theme="dark"] .btn-icon:hover { background: rgba(255,255,255,0.06); }
.btn-sm { padding: 5px 10px; font-size: 13px; }
.btn-destructive { background: var(--color-bg); color: var(--color-red); border: 1px solid rgba(212,86,86,0.25); padding: 7px 13px; }
.btn-destructive:hover { background: rgba(212,86,86,0.08); }

/* Inputs */
.input {
  width: 100%;
  padding: 7px 11px;
  height: 34px;
  background: var(--color-bg);
  color: var(--color-text-primary);
  border: 1px solid var(--color-border-strong);
  border-radius: 8px;
  font-size: 14px;
  transition: border 120ms;
}
.input::placeholder { color: var(--color-text-placeholder); }
.input:focus { outline: none; border-color: var(--color-brand); box-shadow: 0 0 0 3px var(--focus-ring-tint); }
.input-search { padding-left: 32px; }

/* Card / Panel */
.card {
  background: var(--color-card);
  border: 1px solid var(--color-border-subtle);
  border-radius: 14px;
  padding: 20px;
}
.panel {
  background: var(--color-panel);
  border: 1px solid var(--color-border-subtle);
  border-radius: 14px;
  padding: 20px;
}

/* Chips */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 6px;
  font-size: 12px; font-weight: 500;
  background: var(--color-row-hover); color: var(--color-text-secondary);
  white-space: nowrap;
}
.chip-mint { background: var(--color-brand-light); color: var(--color-brand-deep); }
.chip-amber { background: rgba(195,125,13,0.12); color: var(--color-amber); }
.chip-blue { background: rgba(55,114,207,0.12); color: var(--color-blue); }
.chip-red { background: rgba(212,86,86,0.12); color: var(--color-red); }
.chip-purple { background: rgba(122,90,248,0.12); color: var(--color-purple); }

/* Status badge (pipeline) */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 9999px;
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.55px; text-transform: uppercase;
  white-space: nowrap;
}
.badge-dot { width: 6px; height: 6px; border-radius: 9999px; display: inline-block; }

/* Shell layout */
.shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100%; }
.shell-nav {
  background: var(--color-panel);
  border-right: 1px solid var(--color-border-subtle);
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 2px;
  position: relative;
}
.shell-main { display: flex; flex-direction: column; min-width: 0; }

.topbar {
  display: flex; align-items: center; gap: 12px;
  height: 52px; padding: 0 20px;
  border-bottom: 1px solid var(--color-border-subtle);
  background: var(--color-bg);
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  color: var(--color-text-secondary);
  position: relative;
}
.nav-item:hover { background: var(--color-row-hover); color: var(--color-text-primary); }
.nav-item.active {
  background: var(--color-brand-light);
  color: var(--color-brand-deep);
}
.nav-item.active::before {
  content: ""; position: absolute; left: -12px; top: 4px; bottom: 4px;
  width: 2px; background: var(--color-brand); border-radius: 0 2px 2px 0;
}
.nav-item .nav-count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  color: var(--color-text-muted);
  letter-spacing: 0.4px;
}
.nav-item.active .nav-count { color: var(--color-brand-deep); }
.nav-section {
  padding: 14px 10px 6px;
  font-family: var(--font-sans);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.6px; text-transform: uppercase;
  color: var(--color-text-muted);
}

/* Table */
.table-wrap {
  background: var(--color-card);
  border: 1px solid var(--color-border-subtle);
  border-radius: 12px;
  overflow: hidden;
}
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th {
  background: var(--color-panel);
  text-align: left;
  padding: 10px 14px;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.4px; text-transform: uppercase;
  color: var(--color-text-muted);
  border-bottom: 1px solid var(--color-border-subtle);
}
.tbl tbody td {
  padding: 11px 14px;
  font-size: 13px;
  border-bottom: 1px solid var(--color-border-subtle);
  vertical-align: middle;
}
.tbl tbody tr:nth-child(even) { background: var(--color-row-stripe); }
.tbl tbody tr:hover { background: var(--color-row-hover); cursor: pointer; }
.tbl tbody tr:last-child td { border-bottom: none; }

/* Avatar */
.avatar {
  width: 28px; height: 28px; border-radius: 9999px;
  background: var(--color-brand-light); color: var(--color-brand-deep);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.avatar-sm { width: 22px; height: 22px; font-size: 10px; }
.avatar-lg { width: 40px; height: 40px; font-size: 14px; }
.avatar-logo {
  background: rgba(0,0,0,0.04);
  color: var(--color-text-secondary);
  font-family: var(--font-mono);
  letter-spacing: 0;
}
[data-theme="dark"] .avatar-logo { background: rgba(255,255,255,0.06); }

/* Kanban */
.kanban { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px; }
.kanban-col {
  background: var(--color-panel);
  border: 1px solid var(--color-border-subtle);
  border-radius: 12px;
  padding: 12px;
  min-width: 280px;
  width: 280px;
  flex-shrink: 0;
}
.kanban-col.drop-target { border-color: var(--color-brand); background: var(--color-brand-light); }
.kanban-col-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.kanban-col-title {
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.4px; text-transform: uppercase;
  color: var(--color-text-secondary);
}
.kanban-col-count {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: var(--color-text-muted);
  margin-left: auto;
}
.kanban-card {
  background: var(--color-card);
  border: 1px solid var(--color-border-subtle);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  cursor: grab;
  transition: border 120ms, box-shadow 120ms;
}
.kanban-card:hover { border-color: var(--color-border-medium); box-shadow: var(--shadow-card); }
.kanban-card.dragging { opacity: 0.4; cursor: grabbing; }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.42);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 32px;
  animation: fadein 140ms ease;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--color-bg);
  border: 1px solid var(--color-border-subtle);
  border-radius: 14px;
  box-shadow: var(--shadow-modal);
  max-width: 720px;
  width: 100%;
  max-height: calc(100vh - 64px);
  overflow: auto;
  animation: modalin 200ms cubic-bezier(.2,.8,.2,1);
}
@keyframes modalin { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }

/* Segmented control */
.seg {
  display: inline-flex;
  background: var(--color-panel);
  border: 1px solid var(--color-border-subtle);
  border-radius: 8px;
  padding: 2px;
  gap: 2px;
}
.seg-btn {
  padding: 5px 10px; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  color: var(--color-text-muted);
}
.seg-btn.active {
  background: var(--color-bg);
  color: var(--color-text-primary);
  box-shadow: var(--shadow-button);
}

/* Progress */
.progress {
  height: 6px; width: 100%;
  background: var(--color-row-hover);
  border-radius: 9999px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: var(--color-brand);
  border-radius: 9999px;
  transition: width 240ms ease;
}

/* Pipeline step indicator */
.pipeline-steps {
  display: flex; align-items: center; gap: 0;
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.pipeline-step {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  color: var(--color-text-muted);
  position: relative;
}
.pipeline-step.done { color: var(--color-brand-deep); }
.pipeline-step.active { color: var(--color-text-primary); }
.pipeline-step + .pipeline-step::before {
  content: ""; width: 12px; height: 1px; background: var(--color-border-medium);
  margin-right: 4px;
}

/* Scrollbars */
.kanban::-webkit-scrollbar { height: 10px; }
.kanban::-webkit-scrollbar-thumb { background: var(--color-border-medium); border-radius: 9999px; }

/* Atmospheric mint gradient for marketing surfaces */
.marketing-bg {
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(20,201,139,0.18), transparent 60%),
    radial-gradient(800px 400px at 0% 10%, rgba(20,201,139,0.08), transparent 60%),
    var(--color-bg);
}

/* Preview frame for the dual-theme canvas */
.preview-frame {
  border: 1px solid var(--color-border-subtle);
  border-radius: 18px;
  overflow: hidden;
  background: var(--color-bg);
  box-shadow: var(--shadow-card);
}
.preview-chrome {
  height: 28px; display: flex; align-items: center; gap: 6px;
  padding: 0 12px;
  background: var(--color-panel);
  border-bottom: 1px solid var(--color-border-subtle);
}
.preview-dot { width: 9px; height: 9px; border-radius: 9999px; background: var(--color-border-strong); }

/* misc */
.row { display: flex; align-items: center; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 4px; }
.gap-6 { gap: 6px; }
.gap-8 { gap: 8px; }
.gap-10 { gap: 10px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.gap-20 { gap: 20px; }
.gap-24 { gap: 24px; }
.ml-auto { margin-left: auto; }
.muted { color: var(--color-text-muted); }
.secondary { color: var(--color-text-secondary); }
.divider { height: 1px; background: var(--color-border-subtle); border: none; margin: 0; }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Icons inherit stroke */
.i { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.i-sm { width: 14px; height: 14px; }
.i-lg { width: 20px; height: 20px; }

</style>
</head>

<script type="text/babel">/* global React */
const { useState, useEffect } = React;

// Logomark — três "slots" em altura crescente conectados por uma curva mint.
// Evoca slot (barras) + flow (curva) + pipeline ascendente.
// Square container 24x24 ensures parity with favicon/app icon contexts.
function Logomark({ size = 24, rounded = true, bg, accent = "#14C98B", tone }) {
  // tone: "dark" (default, preto) ou "light" (para uso em fundos mint/escuros)
  const sq = tone === "light" ? "#ededed" : "#0d0d0d";
  const barFill = tone === "light" ? "#0d0d0d" : "#ededed";
  const sqFill = bg ?? sq;
  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      width={size}
      height={size}
      role="img"
      aria-label="Slotflow"
      style={{ display: "block", flexShrink: 0 }}
    >
      <rect x="0" y="0" width="24" height="24" rx={rounded ? 6 : 0} fill={sqFill} />
      {/* Três slots em altura crescente — representam "slots" preenchidos pelo pipeline */}
      <rect x="4.5" y="13" width="3" height="6.5" rx="1.25" fill={barFill} opacity="0.55" />
      <rect x="10.5" y="9.5" width="3" height="10" rx="1.25" fill={barFill} opacity="0.55" />
      <rect x="16.5" y="6" width="3" height="13.5" rx="1.25" fill={barFill} opacity="0.55" />
      {/* Curva de flow conectando os topos dos slots */}
      <path
        d="M 6 13 C 8.5 11.5, 9.5 10.5, 12 9.5 C 14.5 8.5, 15.5 7, 18 6"
        stroke={accent}
        strokeWidth="2.25"
        strokeLinecap="round"
        fill="none"
      />
      {/* Ponta (dot) no último slot — "landed" */}
      <circle cx="18" cy="6" r="1.85" fill={accent} />
    </svg>
  );
}

// Monochrome version
function LogomarkMono({ size = 24, color = "currentColor" }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width={size} height={size} style={{ display: "block", flexShrink: 0 }}>
      <rect x="0" y="0" width="24" height="24" rx="6" fill={color} />
      <rect x="4.5" y="13" width="3" height="6.5" rx="1.25" fill="rgba(255,255,255,0.35)" />
      <rect x="10.5" y="9.5" width="3" height="10" rx="1.25" fill="rgba(255,255,255,0.35)" />
      <rect x="16.5" y="6" width="3" height="13.5" rx="1.25" fill="rgba(255,255,255,0.35)" />
      <path d="M 6 13 C 8.5 11.5, 9.5 10.5, 12 9.5 C 14.5 8.5, 15.5 7, 18 6" stroke="#fff" strokeWidth="2.25" strokeLinecap="round" fill="none" />
      <circle cx="18" cy="6" r="1.85" fill="#fff" />
    </svg>
  );
}

function Wordmark({ size = 20, color }) {
  // Letter-spacing follows DESIGN.md: -0.32px at 20px, scales proportionally
  const tracking = -0.016 * size; // ~-0.32 at 20px
  return (
    <span
      style={{
        fontFamily: "Inter, system-ui, sans-serif",
        fontSize: size,
        fontWeight: 600,
        letterSpacing: `${tracking}px`,
        color: color ?? "var(--color-text-primary)",
        lineHeight: 1,
      }}
    >
      Slotflow
    </span>
  );
}

function Lockup({ size = 20, color, tone }) {
  const markSize = Math.round(size * 1.1);
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
      <Logomark size={markSize} tone={tone} />
      <Wordmark size={size} color={color} />
    </span>
  );
}

window.Logomark = Logomark;
window.LogomarkMono = LogomarkMono;
window.Wordmark = Wordmark;
window.Lockup = Lockup;
</script>

          fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--color-text-muted)",

        }}>⌘K</span>
      </div>

          {theme === "dark" ? <Icons.Sun /> : <Icons.Moon />}
        </button>
        <button className="btn-icon" title="Notifications"><Icons.Bell /></button>
        {onNew && (
          <button className="btn btn-brand btn-sm" onClick={onNew}>
            <Icons.Plus /> New opportunity
          </button>
        )}
      </div>
    </div>
  );
}

function StageBadge({ stage }) {
  const s = STAGES.find((x) => x.key === stage) ?? STAGES[0];
  const cls = ({
    applied: "", screening: "chip-blue", interview: "chip-mint", offer: "chip-mint", rejected: "chip-red",
  })[s.key];
  const dot = s.color;
  return (
    <span className={`badge ${cls}`} style={{
      background: s.key === "offer" ? "var(--color-brand-light)" : undefined,
    }}>
      <span className="badge-dot" style={{ background: dot }} />
      {s.label}
    </span>
  );
}

function CompanyAvatar({ company, size = 28 }) {
  const c = COMPANIES[company];
  return (
    <span className="avatar avatar-logo" style={{ width: size, height: size, fontSize: Math.round(size * 0.42) }}>
      {c?.initial ?? "?"}
    </span>
  );
}

window.Sidebar = Sidebar;
window.Topbar = Topbar;
window.StageBadge = StageBadge;
window.CompanyAvatar = CompanyAvatar;

<script type="text/babel">/* global React, OPPORTUNITIES, STAGES, COMPANIES */
const { useState, useMemo } = React;

function Opportunities({ openOpp }) {
  const Icons = window.Icons;
  const { StageBadge, CompanyAvatar } = window;
  const [q, setQ] = useState("");
  const [stageFilter, setStageFilter] = useState("all");
  const [priorityFilter, setPriorityFilter] = useState("all");
  const [sort, setSort] = useState("updated");

  const filtered = useMemo(() => {
    let r = OPPORTUNITIES.filter((o) => {
      const c = COMPANIES[o.company]?.name ?? "";
      const hay = (o.role + " " + c + " " + o.slug + " " + o.recruiter).toLowerCase();
      if (q && !hay.includes(q.toLowerCase())) return false;
      if (stageFilter !== "all" && o.stage !== stageFilter) return false;
      if (priorityFilter !== "all" && o.priority !== priorityFilter) return false;
      return true;
    });
    if (sort === "fit") r = [...r].sort((a, b) => b.fit - a.fit);
    if (sort === "stage") r = [...r].sort((a, b) => b.stageIndex - a.stageIndex);
    return r;
  }, [q, stageFilter, priorityFilter, sort]);

  return (
    <div style={{ padding: "24px 32px", display: "flex", flexDirection: "column", gap: 16 }}>
      <div className="row gap-12">
        <h1 className="t-page-title" style={{ margin: 0 }}>Opportunities</h1>
        <span className="chip">{OPPORTUNITIES.length} total</span>
        <span className="chip chip-mint">{OPPORTUNITIES.filter(o => o.stage !== "rejected").length} active</span>
      </div>

      {/* Toolbar */}
      <div className="row gap-8" style={{ flexWrap: "wrap" }}>
        <div style={{ position: "relative", width: 320 }}>
          <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: "var(--color-text-placeholder)" }}>
            <Icons.Search />
          </span>
          <input className="input input-search" placeholder="Filter by role, company, slug…" value={q} onChange={(e) => setQ(e.target.value)} />
        </div>

        <div className="seg">
          {["all", ...STAGES.map((s) => s.key)].map((k) => (
            <button key={k} className={`seg-btn ${stageFilter === k ? "active" : ""}`} onClick={() => setStageFilter(k)}>
              {k === "all" ? "All" : STAGES.find((s) => s.key === k).label}
            </button>
          ))}
        </div>

        <div className="seg">
          {[
            { k: "all", l: "Any" }, { k: "high", l: "High" }, { k: "med", l: "Medium" }, { k: "low", l: "Low" }
          ].map((x) => (
            <button key={x.k} className={`seg-btn ${priorityFilter === x.k ? "active" : ""}`} onClick={() => setPriorityFilter(x.k)}>{x.l}</button>
          ))}
        </div>

        <div className="row gap-6 ml-auto">
          <select className="input" style={{ width: "auto", height: 34 }} value={sort} onChange={(e) => setSort(e.target.value)}>
            <option value="updated">Sort: Last updated</option>
            <option value="fit">Sort: Fit score</option>
            <option value="stage">Sort: Stage (furthest)</option>
          </select>
          <button className="btn btn-ghost btn-sm"><Icons.Filter /> Save view</button>
        </div>
      </div>

      {/* Table */}
      <div className="table-wrap">
        <table className="tbl">
          <thead>
            <tr>
              <th style={{ width: 34 }}></th>
              <th>Role</th>
              <th>Stage</th>
              <th>Next action</th>
              <th>Recruiter</th>
              <th>Comp</th>
              <th style={{ textAlign: "right" }}>Fit</th>
              <th>Updated</th>
              <th style={{ width: 40 }}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((o) => (
              <tr key={o.id} onClick={() => openOpp(o.id)}>
                <td>
                  <CompanyAvatar company={o.company} size={24} />
                </td>
                <td>
                  <div style={{ fontWeight: 500, color: "var(--color-text-primary)" }}>{o.role}</div>
                  <div className="row gap-6" style={{ marginTop: 2 }}>
                    <span className="t-caption" style={{ color: "var(--color-text-secondary)" }}>{COMPANIES[o.company].name}</span>
                    <span className="t-mono-micro" style={{ color: "var(--color-text-muted)" }}>{o.slug}</span>
                  </div>
                </td>
                <td><StageBadge stage={o.stage} /></td>
                <td>
                  {o.nextActionDate ? (
                    <div>
                      <div style={{ fontSize: 13 }}>{o.nextAction}</div>
                      <div className="t-mono-micro" style={{ color: "var(--color-text-muted)", marginTop: 2 }}>
                        {new Date(o.nextActionDate).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}
                      </div>
                    </div>
                  ) : (
                    <span className="t-caption" style={{ color: "var(--color-text-placeholder)" }}>—</span>
                  )}
                </td>
                <td>
                  {o.recruiter !== "—" ? (
                    <div className="row gap-8">
                      <div className="avatar avatar-sm">{o.recruiterInitials}</div>
                      <span className="t-cell">{o.recruiter}</span>
                    </div>
                  ) : (
                    <span className="t-caption" style={{ color: "var(--color-text-placeholder)" }}>—</span>
                  )}
                </td>
                <td className="t-cell" style={{ color: "var(--color-text-secondary)" }}>{o.comp}</td>
                <td style={{ textAlign: "right" }}>
                  <span style={{
                    display: "inline-block", minWidth: 34,
                    fontFamily: "var(--font-mono)", fontSize: 12, fontWeight: 600,
                    color: o.fit >= 85 ? "var(--color-brand-deep)" : o.fit >= 75 ? "var(--color-text-primary)" : "var(--color-text-muted)",
                  }}>{o.fit}</span>
                </td>
                <td className="t-caption">{o.updatedAt}</td>
                <td onClick={(e) => e.stopPropagation()}>
                  <button className="btn-icon"><Icons.More /></button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length === 0 && (
          <div style={{ padding: 48, textAlign: "center" }}>
            <div className="t-sub" style={{ marginBottom: 6 }}>No results</div>
            <div className="t-caption">Try removing a filter or clearing search.</div>
          </div>
        )}
      </div>
    </div>
  );
}

window.Opportunities = Opportunities;
</script>
<script type="text/babel">/* global React, OPPORTUNITIES, STAGES, COMPANIES */
const { useState } = React;

function Pipeline({ openOpp }) {
  const Icons = window.Icons;
  const { CompanyAvatar } = window;
  const [opps, setOpps] = useState(OPPORTUNITIES);
  const [dragging, setDragging] = useState(null);
  const [dropTarget, setDropTarget] = useState(null);

  const byStage = STAGES.map((s) => ({
    ...s, items: opps.filter((o) => o.stage === s.key),
  }));

  const onDragStart = (id) => (e) => {
    setDragging(id);
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", id); } catch (_) {}
  };
  const onDragEnd = () => { setDragging(null); setDropTarget(null); };
  const onDragOver = (stage) => (e) => { e.preventDefault(); setDropTarget(stage); };
  const onDrop = (stage) => (e) => {
    e.preventDefault();
    if (!dragging) return;
    setOpps((prev) => prev.map((o) => o.id === dragging ? { ...o, stage } : o));
    setDragging(null); setDropTarget(null);
  };

  return (
    <div style={{ padding: "24px 32px", display: "flex", flexDirection: "column", gap: 16, minHeight: 0, flex: 1 }}>
      <div className="row gap-12">
        <h1 className="t-page-title" style={{ margin: 0 }}>Pipeline</h1>
        <span className="t-caption">Drag cards between columns to update stage</span>
        <div className="ml-auto row gap-6">
          <button className="btn btn-ghost btn-sm"><Icons.Filter/> Filter</button>
          <button className="btn btn-ghost btn-sm"><Icons.Calendar/> This week</button>
        </div>
      </div>

      <div className="kanban" style={{ flex: 1, minHeight: 0 }}>
        {byStage.map((col) => (
          <div key={col.key}
            className={`kanban-col ${dropTarget === col.key ? "drop-target" : ""}`}
            onDragOver={onDragOver(col.key)}
            onDrop={onDrop(col.key)}
            onDragLeave={() => setDropTarget(null)}
          >
            <div className="kanban-col-head">
              <span className="badge-dot" style={{ background: col.color, width: 8, height: 8 }}/>
              <span className="kanban-col-title">{col.label}</span>
              <span className="kanban-col-count">{col.items.length}</span>
              <button className="btn-icon"><Icons.Plus/></button>
            </div>
            {col.items.map((o) => (
              <div key={o.id}
                className={`kanban-card ${dragging === o.id ? "dragging" : ""}`}
                draggable
                onDragStart={onDragStart(o.id)}
                onDragEnd={onDragEnd}
                onClick={() => openOpp(o.id)}
              >
                <div className="row gap-8" style={{ marginBottom: 8 }}>
                  <CompanyAvatar company={o.company} size={22}/>
                  <span className="t-body-med" style={{ fontSize: 13 }}>{COMPANIES[o.company].name}</span>
                  <span className="t-mono-micro ml-auto" style={{ color: "var(--color-text-muted)" }}>
                    {o.fit}
                  </span>
                </div>
                <div style={{ fontSize: 13, fontWeight: 500, lineHeight: 1.3, marginBottom: 8,
                  display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden"
                }}>{o.role}</div>
                <div className="t-mono-micro" style={{ color: "var(--color-text-muted)", marginBottom: 10 }}>{o.slug}</div>
                {o.nextActionDate && (
                  <div className="row gap-6" style={{
                    padding: "6px 8px", borderRadius: 6,
                    background: "var(--color-row-stripe)",
                    fontSize: 12,
                  }}>
                    <Icons.Calendar className="i" style={{ width: 12, height: 12, color: "var(--color-text-muted)" }}/>
                    <span style={{ color: "var(--color-text-secondary)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{o.nextAction}</span>
                  </div>
                )}
                <div className="row gap-6" style={{ marginTop: 8 }}>
                  {o.priority === "high" && <span className="chip chip-amber" style={{ fontSize: 11 }}>High</span>}
                  {o.recruiterInitials && (
                    <span className="avatar avatar-sm ml-auto" title={o.recruiter}>{o.recruiterInitials}</span>
                  )}
                </div>
              </div>
            ))}
            {col.items.length === 0 && (
              <div style={{
                padding: "24px 12px", textAlign: "center",
                fontSize: 12, color: "var(--color-text-placeholder)",
                border: "1px dashed var(--color-border-medium)", borderRadius: 10,
              }}>Drop here</div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

window.Pipeline = Pipeline;
</script>

<script type="text/babel">/* global React, ReactDOM */
const { useState, useEffect, useMemo } = React;

function App() {
  const [route, setRoute] = useState("app"); // "landing" | "login" | "app"
  const [screen, setScreen] = useState("dashboard");
  const [openOppId, setOpenOppId] = useState(null);

  const counts = useMemo(() => ({
    opportunities: window.OPPORTUNITIES.filter(o => o.stage !== "rejected").length,
    inbox: window.MESSAGES.filter(m => m.unread).length,
  }), []);

  const openOpp = (id) => setOpenOppId(id);
  const closeOpp = () => setOpenOppId(null);

  const { Sidebar, Topbar, Dashboard, Opportunities, Pipeline, Inbox, Resume, Settings,
          Landing, Login, OpportunityDetail } = window;

  if (route === "landing") return <Landing goLogin={() => setRoute("login")} />;
  if (route === "login") return <Login goApp={() => setRoute("app")} goLanding={() => setRoute("landing")} />;

  const titles = {
    dashboard: "Dashboard", opportunities: "Opportunities", pipeline: "Pipeline",
    inbox: "Inbox", resume: "Resume Studio", settings: "Settings",
  };

  return (
    <div className="shell" style={{ minHeight: "100vh" }}>
      <Sidebar route={screen} setRoute={(r) => {
        if (r.startsWith("opportunity:")) { openOpp(r.split(":")[1]); return; }
        setScreen(r);
      }} counts={counts} />
      <div className="shell-main">
        <Topbar
          title={titles[screen] ?? "Slotflow"}
          theme={window.__theme}
          toggleTheme={window.__toggleTheme}
          onNew={screen === "opportunities" || screen === "pipeline" ? () => {} : null}
        />
        <main style={{ flex: 1, overflow: "auto", display: "flex", flexDirection: "column" }}>
          {screen === "dashboard" && <Dashboard setRoute={setScreen} openOpp={openOpp} />}
          {screen === "opportunities" && <Opportunities openOpp={openOpp} />}
          {screen === "pipeline" && <Pipeline openOpp={openOpp} />}
          {screen === "inbox" && <Inbox openOpp={openOpp} />}
          {screen === "resume" && <Resume />}
          {screen === "settings" && <Settings />}
        </main>
      </div>
      {openOppId && <OpportunityDetail oppId={openOppId} onClose={closeOpp} />}
    </div>
  );
}

// ===== Dual theme wrapper =====
function DualPreview() {
  const [route, setRoute] = useState(() => localStorage.getItem("sf_route") ?? "app");
  const [screen, setScreen] = useState(() => localStorage.getItem("sf_screen") ?? "dashboard");
  const [openOppId, setOpenOppId] = useState(null);

  useEffect(() => { localStorage.setItem("sf_route", route); }, [route]);
  useEffect(() => { localStorage.setItem("sf_screen", screen); }, [screen]);

  const routes = [
    { k: "landing", l: "Landing" },
    { k: "login", l: "Login" },
    { k: "app:dashboard", l: "Dashboard" },
    { k: "app:opportunities", l: "Opportunities" },
    { k: "app:pipeline", l: "Pipeline" },
    { k: "app:inbox", l: "Inbox" },
    { k: "app:resume", l: "Resume Studio" },
    { k: "app:settings", l: "Settings" },
  ];

  const active = route === "landing" ? "landing" : route === "login" ? "login" : `app:${screen}`;
  const go = (k) => {
    if (k === "landing") { setRoute("landing"); return; }
    if (k === "login") { setRoute("login"); return; }
    const s = k.split(":")[1];
    setRoute("app"); setScreen(s);
  };

  const openOpp = (id) => setOpenOppId(id);
  const closeOpp = () => setOpenOppId(null);

  const { Sidebar, Topbar, Dashboard, Opportunities, Pipeline, Inbox, Resume, Settings,
          Landing, Login, OpportunityDetail, Lockup, Logomark } = window;

  const titles = {
    dashboard: "Dashboard", opportunities: "Opportunities", pipeline: "Pipeline",
    inbox: "Inbox", resume: "Resume Studio", settings: "Settings",
  };

  const renderScreen = (themeKey) => {
    const content = route === "landing" ? <Landing goLogin={() => setRoute("login")} />
      : route === "login" ? <Login goApp={() => { setRoute("app"); setScreen("dashboard"); }} goLanding={() => setRoute("landing")} />
      : (
        <div className="shell" style={{ minHeight: "100%", height: "100%" }}>
          <Sidebar route={screen} setRoute={(r) => {
            if (r.startsWith("opportunity:")) { openOpp(r.split(":")[1]); return; }
            setScreen(r);
          }} counts={{
            opportunities: window.OPPORTUNITIES.filter(o => o.stage !== "rejected").length,
            inbox: window.MESSAGES.filter(m => m.unread).length,
          }}/>
          <div className="shell-main">
            <Topbar
              title={titles[screen] ?? "Slotflow"}
              theme={themeKey}
              toggleTheme={() => {}}
              onNew={screen === "opportunities" || screen === "pipeline" ? () => {} : null}
            />
            <main style={{ flex: 1, overflow: "auto", display: "flex", flexDirection: "column" }}>
              {screen === "dashboard" && <Dashboard setRoute={setScreen} openOpp={openOpp} />}
              {screen === "opportunities" && <Opportunities openOpp={openOpp} />}
              {screen === "pipeline" && <Pipeline openOpp={openOpp} />}
              {screen === "inbox" && <Inbox openOpp={openOpp} />}
              {screen === "resume" && <Resume />}
              {screen === "settings" && <Settings />}
            </main>
          </div>
        </div>
      );
    return content;
  };

  return (
    <div style={{ minHeight: "100vh", background: "#f3f3f3", color: "#0d0d0d" }}>
      {/* Canvas nav */}
      <div style={{
        position: "sticky", top: 0, zIndex: 50,
        background: "rgba(255,255,255,0.82)", backdropFilter: "blur(10px)",
        borderBottom: "1px solid rgba(0,0,0,0.08)",
        padding: "12px 20px", display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap"
      }}>
        <Lockup size={18}/>
        <span style={{ fontSize: 12, color: "#666", fontFamily: "var(--font-mono)", letterSpacing: 0.5, marginRight: 8 }}>
          DESIGN REVIEW · v2
        </span>
        <div style={{ display: "flex", gap: 4, background: "#ededed", borderRadius: 8, padding: 2, flexWrap: "wrap" }}>
          {routes.map(r => (
            <button key={r.k} onClick={() => go(r.k)} style={{
              padding: "5px 10px", borderRadius: 6,
              fontSize: 12, fontWeight: 500,
              color: active === r.k ? "#0d0d0d" : "#666",
              background: active === r.k ? "#fff" : "transparent",
              boxShadow: active === r.k ? "rgba(0,0,0,0.05) 0 1px 2px" : "none",
            }}>{r.l}</button>
          ))}
        </div>
        <span style={{ marginLeft: "auto", fontSize: 12, color: "#666" }}>
          Light · Dark side-by-side
        </span>
      </div>

      {/* Dual frames */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, padding: 16 }}>
        {["light", "dark"].map((t) => (
          <div key={t} style={{
            borderRadius: 18, overflow: "hidden",
            border: "1px solid rgba(0,0,0,0.08)",
            background: t === "light" ? "#fff" : "#0d0d0d",
            boxShadow: "rgba(0,0,0,0.04) 0 2px 6px",
          }}>
            <div style={{
              display: "flex", alignItems: "center", gap: 6,
              padding: "8px 14px", background: t === "light" ? "#fafafa" : "#171717",
              borderBottom: `1px solid ${t === "light" ? "rgba(0,0,0,0.06)" : "rgba(255,255,255,0.08)"}`,
              height: 32,
            }}>
              <span style={{ width: 9, height: 9, borderRadius: 9999, background: t === "light" ? "rgba(0,0,0,0.12)" : "rgba(255,255,255,0.15)" }}/>
              <span style={{ width: 9, height: 9, borderRadius: 9999, background: t === "light" ? "rgba(0,0,0,0.12)" : "rgba(255,255,255,0.15)" }}/>
              <span style={{ width: 9, height: 9, borderRadius: 9999, background: t === "light" ? "rgba(0,0,0,0.12)" : "rgba(255,255,255,0.15)" }}/>
              <span style={{
                marginLeft: 10,
                fontFamily: "ui-monospace, monospace", fontSize: 10, letterSpacing: 0.5,
                color: t === "light" ? "#666" : "#8a8a8a", textTransform: "uppercase",
              }}>
                {t === "light" ? "Light" : "Dark"}
              </span>
            </div>
            <div data-theme={t} style={{ height: 780, overflow: "auto" }}>
              {renderScreen(t)}
            </div>
          </div>
        ))}
      </div>

      {openOppId && (
        <div data-theme="light">
          <OpportunityDetail oppId={openOppId} onClose={closeOpp}/>
        </div>
      )}

      <div style={{ padding: "16px 20px 32px", textAlign: "center", fontSize: 12, color: "#888" }}>
        Tip: drag cards in Pipeline · click any opportunity row to open detail · filters + search on Opportunities
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DualPreview />);
</script>
