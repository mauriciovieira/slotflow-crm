name: Release (backend)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/release-backend.yml"
  workflow_dispatch:

concurrency:
  group: release-backend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: backend
          git_committer_name: github-actions
          git_committer_email: github-actions@users.noreply.github.com

      - name: Prepend root changelog index
        if: success() && steps.release.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          VER="${{ steps.release.outputs.version }}"
          ./scripts/prepend-root-changelog.sh backend "$VER"
          git add RELEASES.md
          git diff --staged --quiet || git commit -m "docs: update root changelog index for backend ${VER} [skip ci]"
          git push origin main
