name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: slotflow
          POSTGRES_PASSWORD: slotflow
          POSTGRES_DB: slotflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U slotflow -d slotflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Backend lint
        working-directory: backend
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Backend unit tests
        working-directory: backend
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: slotflow
          POSTGRES_PASSWORD: slotflow
          POSTGRES_DB: slotflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U slotflow -d slotflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: slotflow
      POSTGRES_USER: slotflow
      POSTGRES_PASSWORD: slotflow
      DJANGO_SETTINGS_MODULE: config.settings.local
      SLOTFLOW_BYPASS_2FA: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m venv backend/.venv
          backend/.venv/bin/pip install -r backend/requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Apply migrations
        working-directory: backend
        run: .venv/bin/python manage.py migrate --noinput

      - name: Run Playwright tests
        run: make test-e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report

  release-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: .release/root/package-lock.json

      - name: Install root-line release deps
        working-directory: .release/root
        run: npm ci

      - name: Filter-plugin unit tests
        working-directory: .release/root
        run: npm test

      - name: Prepend-script integration test
        run: ./scripts/test-prepend-root-changelog.sh
