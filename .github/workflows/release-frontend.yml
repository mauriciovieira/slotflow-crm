name: Release (frontend)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/release-frontend.yml"
  workflow_dispatch:

concurrency:
  group: release-frontend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Record frontend version on main
        id: before
        working-directory: .
        run: |
          git fetch origin main
          echo "ver=$(git show origin/main:frontend/package.json | node -p 'JSON.parse(require("fs").readFileSync(0,"utf8")).version')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: sr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Prepend root changelog index
        working-directory: .
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          VER_AFTER=$(node -p "require('./frontend/package.json').version")
          if [ "${{ steps.before.outputs.ver }}" = "$VER_AFTER" ]; then
            echo "No frontend version bump; skipping root index update"
            exit 0
          fi
          ./scripts/prepend-root-changelog.sh frontend "$VER_AFTER"
          git add RELEASES.md
          git diff --staged --quiet || git commit -m "docs: update root changelog index for frontend ${VER_AFTER} [skip ci]"
          git push origin main
