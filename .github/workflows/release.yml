name: Release

# After each merge to the default branch, determine the next SemVer from conventional
# commits, update CHANGELOG.md and backend version files, tag, and create a GitHub Release.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: backend
          git_committer_name: github-actions
          git_committer_email: github-actions@users.noreply.github.com
